# Docs: https://github.com/azure/functions-action
# Python + Azure Functions + Flex Consumption Plan

name: Build and deploy Python project to Azure Function App - udr-scraper

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: '.'
  PYTHON_VERSION: '3.11'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # ── FIX 1: Install deps into .python_packages (correct layout for Linux Functions) ──
      # Do NOT use a venv — Azure Functions on Linux reads from .python_packages/lib/site-packages
      - name: Install dependencies to .python_packages
        run: |
          pip install --upgrade pip
          pip install --target=".python_packages/lib/site-packages" -r requirements.txt

      # ── FIX 2: Exclude .git, __pycache__, and *.pyc from the zip ──
      - name: Zip artifact for deployment
        run: |
          zip -r release.zip . \
            --exclude "*.git*" \
            --exclude "__pycache__/*" \
            --exclude "*.pyc" \
            --exclude "*.pyo" \
            --exclude "*.egg-info/*" \
            --exclude "tests/*"

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment: production
    permissions:
      id-token: write   # required for OIDC JWT
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Unzip artifact for deployment
        run: |
          unzip release.zip
          rm release.zip

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZUREAPPSERVICE_CLIENTID_D1A64AFDC63D4BB1BB6C7AB5C1487614 }}
          tenant-id:       ${{ secrets.AZUREAPPSERVICE_TENANTID_FE4DD6327C3D4AEF960ABBC91CB6D4DE }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_FD73197F01C04584B75D7C5C8D06BCB3 }}

      # ── FIX 3: Add scm-do-build-during-deployment: false (we pre-built) ──
      - name: Deploy to Azure Function App
        uses: Azure/functions-action@v1
        id: deploy-to-function
        with:
          app-name:  'udr-scraper'
          slot-name: 'Production'
          package:   ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
          scm-do-build-during-deployment: false
